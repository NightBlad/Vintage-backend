# ===== DATABASE CONFIGURATION =====
# H2 Database with file storage - Compatible configuration
spring.datasource.url=jdbc:h2:file:./data/vintage_pharmacy_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== APPLICATION CONFIGURATION =====
spring.application.name=Vintage
server.port=1199

# ===== JSON / JACKSON =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.default-property-inclusion=non_null

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=30MB
app.upload.dir=${user.dir}/uploads

# ===== LOGGING =====
logging.level.com.example.vintage=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=ERROR

# ===== SECURITY =====
server.servlet.session.timeout=30m
# Cookie settings cho Angular frontend
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true

# ===== GEMINI AI CHATBOT CONFIGURATION =====
# Gemini API Configuration (loaded from environment variables or .env file)
# Set GEMINI_API_KEY in your environment or .env file
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}
