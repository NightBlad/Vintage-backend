<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Thông tin cá nhân - Vintage Pharmacy</title>
</head>
<body>
    <main>
        <div class="container my-5">
            <!-- Header -->
            <div class="row mb-4">
                <div class="col-12">
                    <h2 class="fw-bold mb-3">
                        <i class="fas fa-user-edit me-2 text-primary"></i>
                        Thông tin cá nhân
                    </h2>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
                            <li class="breadcrumb-item active">Thông tin cá nhân</li>
                        </ol>
                    </nav>
                </div>
            </div>

            <!-- Alert Messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row">
                <!-- Sidebar -->
                <div class="col-lg-3 mb-4">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">
                                <i class="fas fa-user me-2"></i>Tài khoản của tôi
                            </h5>
                        </div>
                        <div class="list-group list-group-flush">
                            <a href="/account/profile" class="list-group-item list-group-item-action active">
                                <i class="fas fa-user-edit me-2"></i>Thông tin cá nhân
                            </a>
                            <a href="/account/orders" class="list-group-item list-group-item-action">
                                <i class="fas fa-shopping-bag me-2"></i>Đơn hàng của tôi
                            </a>
                            <a href="/account/addresses" class="list-group-item list-group-item-action">
                                <i class="fas fa-map-marker-alt me-2"></i>Địa chỉ giao hàng
                            </a>
                            <a href="/account/change-password" class="list-group-item list-group-item-action">
                                <i class="fas fa-key me-2"></i>Đổi mật khẩu
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="col-lg-9">
                    <div class="card">
                        <div class="card-header bg-light">
                            <h5 class="mb-0">
                                <i class="fas fa-edit me-2"></i>Cập nhật thông tin cá nhân
                            </h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/account/profile}" th:object="${user}" method="post">
                                <div class="row">
                                    <!-- Username (readonly) -->
                                    <div class="col-md-6 mb-3">
                                        <label for="username" class="form-label">
                                            <i class="fas fa-user me-1"></i>Tên đăng nhập
                                        </label>
                                        <input type="text"
                                               class="form-control bg-light"
                                               id="username"
                                               th:value="${user.username}"
                                               readonly>
                                        <div class="form-text">Tên đăng nhập không thể thay đổi</div>
                                    </div>

                                    <!-- Full Name -->
                                    <div class="col-md-6 mb-3">
                                        <label for="fullName" class="form-label">
                                            <i class="fas fa-id-card me-1"></i>Họ và tên <span class="text-danger">*</span>
                                        </label>
                                        <input type="text"
                                               class="form-control"
                                               th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"
                                               id="fullName"
                                               th:field="*{fullName}"
                                               placeholder="Nhập họ và tên">
                                        <div th:if="${#fields.hasErrors('fullName')}"
                                             class="invalid-feedback"
                                             th:errors="*{fullName}">
                                        </div>
                                    </div>

                                    <!-- Email -->
                                    <div class="col-md-6 mb-3">
                                        <label for="email" class="form-label">
                                            <i class="fas fa-envelope me-1"></i>Email <span class="text-danger">*</span>
                                        </label>
                                        <input type="email"
                                               class="form-control"
                                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                               id="email"
                                               th:field="*{email}"
                                               placeholder="example@email.com">
                                        <div th:if="${#fields.hasErrors('email')}"
                                             class="invalid-feedback"
                                             th:errors="*{email}">
                                        </div>
                                    </div>

                                    <!-- Phone -->
                                    <div class="col-md-6 mb-3">
                                        <label for="phone" class="form-label">
                                            <i class="fas fa-phone me-1"></i>Số điện thoại
                                        </label>
                                        <input type="tel"
                                               class="form-control"
                                               id="phone"
                                               th:field="*{phone}"
                                               placeholder="0123456789">
                                    </div>

                                    <!-- Address -->
                                    <div class="col-12 mb-3">
                                        <label for="address" class="form-label">
                                            <i class="fas fa-map-marker-alt me-1"></i>Địa chỉ
                                        </label>
                                        <textarea class="form-control"
                                                  id="address"
                                                  th:field="*{address}"
                                                  rows="3"
                                                  placeholder="Nhập địa chỉ chi tiết"></textarea>
                                    </div>
                                </div>

                                <!-- Action Buttons -->
                                <div class="d-flex justify-content-end gap-2">
                                    <a href="/" class="btn btn-outline-secondary">
                                        <i class="fas fa-times me-2"></i>Hủy
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save me-2"></i>Cập nhật thông tin
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
