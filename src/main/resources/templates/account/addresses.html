<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Địa chỉ giao hàng - Vintage Pharmacy</title>
</head>
<body>
    <main>
        <div class="container my-5">
            <!-- Header -->
            <div class="row mb-4">
                <div class="col-12">
                    <h2 class="fw-bold mb-3">
                        <i class="fas fa-map-marker-alt me-2 text-primary"></i>
                        Địa chỉ giao hàng
                    </h2>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
                            <li class="breadcrumb-item"><a href="/account/profile">Tài khoản</a></li>
                            <li class="breadcrumb-item active">Địa chỉ giao hàng</li>
                        </ol>
                    </nav>
                </div>
            </div>

            <div class="row">
                <!-- Sidebar -->
                <div class="col-lg-3 mb-4">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">
                                <i class="fas fa-user me-2"></i>Tài khoản của tôi
                            </h5>
                        </div>
                        <div class="list-group list-group-flush">
                            <a href="/account/profile" class="list-group-item list-group-item-action">
                                <i class="fas fa-user-edit me-2"></i>Thông tin cá nhân
                            </a>
                            <a href="/account/orders" class="list-group-item list-group-item-action">
                                <i class="fas fa-shopping-bag me-2"></i>Đơn hàng của tôi
                            </a>
                            <a href="/account/addresses" class="list-group-item list-group-item-action active">
                                <i class="fas fa-map-marker-alt me-2"></i>Địa chỉ giao hàng
                            </a>
                            <a href="/account/change-password" class="list-group-item list-group-item-action">
                                <i class="fas fa-key me-2"></i>Đổi mật khẩu
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="col-lg-9">
                    <div class="card">
                        <div class="card-header bg-light d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">
                                <i class="fas fa-address-book me-2"></i>Sổ địa chỉ
                            </h5>
                            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addAddressModal">
                                <i class="fas fa-plus me-1"></i>Thêm địa chỉ mới
                            </button>
                        </div>
                        <div class="card-body">
                            <!-- No Addresses Message -->
                            <div class="text-center py-5">
                                <i class="fas fa-map-marker-alt fa-4x text-muted mb-3"></i>
                                <h4 class="text-muted">Chưa có địa chỉ giao hàng</h4>
                                <p class="text-muted mb-4">Thêm địa chỉ giao hàng để việc đặt hàng trở nên thuận tiện hơn.</p>
                                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addAddressModal">
                                    <i class="fas fa-plus me-2"></i>Thêm địa chỉ đầu tiên
                                </button>
                            </div>

                            <!-- Address List (will be populated when addresses exist) -->
                            <!--
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <div class="card h-100">
                                        <div class="card-body">
                                            <div class="d-flex justify-content-between align-items-start mb-2">
                                                <h6 class="card-title">Địa chỉ nhà riêng</h6>
                                                <span class="badge bg-success">Mặc định</span>
                                            </div>
                                            <p class="card-text">
                                                <strong>Nguyễn Văn A</strong><br>
                                                0123456789<br>
                                                123 Đường ABC, Phường XYZ<br>
                                                Quận 1, TP.HCM
                                            </p>
                                            <div class="d-flex gap-2">
                                                <button class="btn btn-outline-primary btn-sm">
                                                    <i class="fas fa-edit me-1"></i>Sửa
                                                </button>
                                                <button class="btn btn-outline-danger btn-sm">
                                                    <i class="fas fa-trash me-1"></i>Xóa
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Address Modal -->
        <div class="modal fade" id="addAddressModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="fas fa-plus me-2"></i>Thêm địa chỉ mới
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Tên người nhận <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" placeholder="Nhập tên người nhận">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                                    <input type="tel" class="form-control" placeholder="0123456789">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Tỉnh/Thành phố <span class="text-danger">*</span></label>
                                    <select class="form-select">
                                        <option value="">Chọn tỉnh/thành</option>
                                        <option value="hcm">TP. Hồ Chí Minh</option>
                                        <option value="hn">Hà Nội</option>
                                        <option value="dn">Đà Nẵng</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Quận/Huyện <span class="text-danger">*</span></label>
                                    <select class="form-select">
                                        <option value="">Chọn quận/huyện</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Phường/Xã <span class="text-danger">*</span></label>
                                    <select class="form-select">
                                        <option value="">Chọn phường/xã</option>
                                    </select>
                                </div>
                                <div class="col-12 mb-3">
                                    <label class="form-label">Địa chỉ cụ thể <span class="text-danger">*</span></label>
                                    <textarea class="form-control" rows="3" placeholder="Số nhà, tên đường..."></textarea>
                                </div>
                                <div class="col-12 mb-3">
                                    <label class="form-label">Loại địa chỉ</label>
                                    <div class="d-flex gap-3">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="addressType" value="home" checked>
                                            <label class="form-check-label">
                                                <i class="fas fa-home me-1"></i>Nhà riêng
                                            </label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="addressType" value="office">
                                            <label class="form-check-label">
                                                <i class="fas fa-building me-1"></i>Văn phòng
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="defaultAddress">
                                        <label class="form-check-label" for="defaultAddress">
                                            Đặt làm địa chỉ mặc định
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                            <i class="fas fa-times me-1"></i>Hủy
                        </button>
                        <button type="button" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Lưu địa chỉ
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
