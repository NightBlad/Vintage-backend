<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Debug Orders - Vintage Pharmacy</title>
</head>
<body>
    <main>
        <div class="container my-5">
            <div class="row">
                <div class="col-12">
                    <h2>Debug Information - Orders</h2>
                    <div class="card">
                        <div class="card-header">
                            <h5>Debug Info</h5>
                        </div>
                        <div class="card-body">
                            <pre th:text="${debugInfo}">Debug information will appear here</pre>
                        </div>
                    </div>
                    <div class="mt-3">
                        <a href="/account/orders" class="btn btn-primary">Back to Orders</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
