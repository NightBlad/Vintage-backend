<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Đổi mật khẩu - Vintage Pharmacy</title>
</head>
<body>
    <main>
        <div class="container my-5">
            <!-- Header -->
            <div class="row mb-4">
                <div class="col-12">
                    <h2 class="fw-bold mb-3">
                        <i class="fas fa-key me-2 text-primary"></i>
                        Đổi mật khẩu
                    </h2>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
                            <li class="breadcrumb-item"><a href="/account/profile">Tài khoản</a></li>
                            <li class="breadcrumb-item active">Đổi mật khẩu</li>
                        </ol>
                    </nav>
                </div>
            </div>

            <!-- Alert Messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row">
                <!-- Sidebar -->
                <div class="col-lg-3 mb-4">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">
                                <i class="fas fa-user me-2"></i>Tài khoản của tôi
                            </h5>
                        </div>
                        <div class="list-group list-group-flush">
                            <a href="/account/profile" class="list-group-item list-group-item-action">
                                <i class="fas fa-user-edit me-2"></i>Thông tin cá nhân
                            </a>
                            <a href="/account/orders" class="list-group-item list-group-item-action">
                                <i class="fas fa-shopping-bag me-2"></i>Đơn hàng của tôi
                            </a>
                            <a href="/account/addresses" class="list-group-item list-group-item-action">
                                <i class="fas fa-map-marker-alt me-2"></i>Địa chỉ giao hàng
                            </a>
                            <a href="/account/change-password" class="list-group-item list-group-item-action active">
                                <i class="fas fa-key me-2"></i>Đổi mật khẩu
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="col-lg-9">
                    <div class="card">
                        <div class="card-header bg-light">
                            <h5 class="mb-0">
                                <i class="fas fa-shield-alt me-2"></i>Thay đổi mật khẩu
                            </h5>
                        </div>
                        <div class="card-body">
                            <div class="alert alert-info">
                                <i class="fas fa-info-circle me-2"></i>
                                <strong>Lưu ý:</strong> Vì lý do bảo mật, vui lòng nhập mật khẩu hiện tại để xác thực trước khi thay đổi.
                            </div>

                            <form action="/account/change-password" method="post">
                                <div class="row">
                                    <!-- Current Password -->
                                    <div class="col-12 mb-3">
                                        <label for="currentPassword" class="form-label">
                                            <i class="fas fa-lock me-1"></i>Mật khẩu hiện tại <span class="text-danger">*</span>
                                        </label>
                                        <div class="input-group">
                                            <input type="password"
                                                   class="form-control"
                                                   id="currentPassword"
                                                   name="currentPassword"
                                                   required
                                                   placeholder="Nhập mật khẩu hiện tại">
                                            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('currentPassword')">
                                                <i class="fas fa-eye" id="currentPasswordIcon"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <!-- New Password -->
                                    <div class="col-md-6 mb-3">
                                        <label for="newPassword" class="form-label">
                                            <i class="fas fa-key me-1"></i>Mật khẩu mới <span class="text-danger">*</span>
                                        </label>
                                        <div class="input-group">
                                            <input type="password"
                                                   class="form-control"
                                                   id="newPassword"
                                                   name="newPassword"
                                                   required
                                                   minlength="6"
                                                   placeholder="Nhập mật khẩu mới">
                                            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('newPassword')">
                                                <i class="fas fa-eye" id="newPasswordIcon"></i>
                                            </button>
                                        </div>
                                        <div class="form-text">Mật khẩu phải có ít nhất 6 ký tự</div>
                                    </div>

                                    <!-- Confirm Password -->
                                    <div class="col-md-6 mb-3">
                                        <label for="confirmPassword" class="form-label">
                                            <i class="fas fa-check-circle me-1"></i>Xác nhận mật khẩu <span class="text-danger">*</span>
                                        </label>
                                        <div class="input-group">
                                            <input type="password"
                                                   class="form-control"
                                                   id="confirmPassword"
                                                   name="confirmPassword"
                                                   required
                                                   placeholder="Nhập lại mật khẩu mới">
                                            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('confirmPassword')">
                                                <i class="fas fa-eye" id="confirmPasswordIcon"></i>
                                            </button>
                                        </div>
                                        <div id="passwordMatch" class="form-text"></div>
                                    </div>
                                </div>

                                <!-- Action Buttons -->
                                <div class="d-flex justify-content-end gap-2">
                                    <a href="/account/profile" class="btn btn-outline-secondary">
                                        <i class="fas fa-times me-2"></i>Hủy
                                    </a>
                                    <button type="submit" class="btn btn-primary" id="submitBtn">
                                        <i class="fas fa-save me-2"></i>Đổi mật khẩu
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- JavaScript -->
        <script>
            function togglePassword(fieldId) {
                const field = document.getElementById(fieldId);
                const icon = document.getElementById(fieldId + 'Icon');

                if (field.type === 'password') {
                    field.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    field.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            }

            // Check password match
            document.getElementById('confirmPassword').addEventListener('input', function() {
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = this.value;
                const matchDiv = document.getElementById('passwordMatch');
                const submitBtn = document.getElementById('submitBtn');

                if (confirmPassword.length > 0) {
                    if (newPassword === confirmPassword) {
                        matchDiv.innerHTML = '<i class="fas fa-check text-success me-1"></i>Mật khẩu khớp';
                        matchDiv.className = 'form-text text-success';
                        submitBtn.disabled = false;
                    } else {
                        matchDiv.innerHTML = '<i class="fas fa-times text-danger me-1"></i>Mật khẩu không khớp';
                        matchDiv.className = 'form-text text-danger';
                        submitBtn.disabled = true;
                    }
                } else {
                    matchDiv.innerHTML = '';
                    submitBtn.disabled = false;
                }
            });
        </script>
    </main>
</body>
</html>
