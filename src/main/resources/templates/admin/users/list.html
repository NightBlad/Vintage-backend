<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin-layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Quản lý tài khoản - Admin</title>
</head>
<body>
    <div th:fragment="content">
        <div class="container-fluid">
            <!-- Page Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="fas fa-users me-2"></i>Quản lý tài khoản</h2>
            </div>

            <!-- Flash Messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Users Table -->
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Danh sách người dùng</h5>
                </div>
                <div class="card-body">
                    <div th:if="${users.empty}" class="text-center py-4">
                        <i class="fas fa-users fa-3x text-muted mb-3"></i>
                        <p class="text-muted">Không có người dùng nào</p>
                    </div>

                    <div th:unless="${users.empty}" class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Tên đăng nhập</th>
                                    <th>Email</th>
                                    <th>Họ tên</th>
                                    <th>Quyền</th>
                                    <th>Trạng thái</th>
                                    <th>Ngày tạo</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${users.content}">
                                    <td th:text="${user.id}"></td>
                                    <td>
                                        <strong th:text="${user.username}"></strong>
                                    </td>
                                    <td th:text="${user.email}"></td>
                                    <td th:text="${user.fullName}"></td>
                                    <td>
                                        <span th:each="role, iterStat : ${user.roles}"
                                              th:class="|badge ${role.name.name() == 'ADMIN' ? 'bg-danger' : 'bg-primary'} me-1|"
                                              th:text="${role.name.name()}">
                                        </span>
                                    </td>
                                    <td>
                                        <span th:if="${user.enabled}" class="badge bg-success">
                                            <i class="fas fa-check me-1"></i>Hoạt động
                                        </span>
                                        <span th:unless="${user.enabled}" class="badge bg-secondary">
                                            <i class="fas fa-times me-1"></i>Vô hiệu hóa
                                        </span>
                                    </td>
                                    <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                    <td>
                                        <div class="btn-group" role="group">
                                            <a th:href="@{/admin/users/{id}(id=${user.id})}"
                                               class="btn btn-sm btn-outline-primary" title="Xem chi tiết">
                                                <i class="fas fa-eye"></i>
                                            </a>

                                            <form method="post" th:action="@{/admin/users/{id}/toggle-status(id=${user.id})}"
                                                  class="d-inline">
                                                <!-- CSRF Token -->
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                <button type="submit"
                                                        th:class="|btn btn-sm ${user.enabled ? 'btn-outline-warning' : 'btn-outline-success'}|"
                                                        th:title="${user.enabled ? 'Vô hiệu hóa' : 'Kích hoạt'}"
                                                        onclick="return confirm('Bạn có chắc chắn muốn thay đổi trạng thái tài khoản này?')">
                                                    <i th:class="|fas ${user.enabled ? 'fa-ban' : 'fa-check'}|"></i>
                                                </button>
                                            </form>

                                            <form method="post" th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                                                  class="d-inline" th:if="${!user.roles.?[name.name() == 'ADMIN'].empty == false}">
                                                <!-- CSRF Token -->
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                                        title="Xóa người dùng"
                                                        onclick="return confirm('Bạn có chắc chắn muốn xóa người dùng này?')">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                        <!-- Pagination -->
                        <nav th:if="${users.totalPages > 1}" aria-label="Phân trang">
                            <ul class="pagination justify-content-center">
                                <li th:class="|page-item ${users.first ? 'disabled' : ''}|">
                                    <a class="page-link" th:href="@{/admin/users(page=${users.number - 1})}">
                                        <i class="fas fa-chevron-left"></i>
                                    </a>
                                </li>

                                <li th:each="page : ${#numbers.sequence(0, users.totalPages - 1)}"
                                    th:class="|page-item ${page == users.number ? 'active' : ''}|">
                                    <a class="page-link" th:href="@{/admin/users(page=${page})}" th:text="${page + 1}"></a>
                                </li>

                                <li th:class="|page-item ${users.last ? 'disabled' : ''}|">
                                    <a class="page-link" th:href="@{/admin/users(page=${users.number + 1})}">
                                        <i class="fas fa-chevron-right"></i>
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
